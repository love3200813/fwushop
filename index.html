<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>飯丸屋點餐系統</title>
    <style>
        :root { --primary: #f39c12; --bg: #1a1a1a; --card: #2d2d2d; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        
        /* 基礎排版 (預設手機) */
        .page { display: none; margin: auto; max-width: 600px; }
        .active { display: block; }
        .btn-main { width: 100%; padding: 15px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 18px; cursor: pointer; text-align: center;}
        button:disabled { background-color: #7f8c8d !important; cursor: not-allowed; opacity: 0.8; }
        select, input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 8px; border: none; font-size: 16px; box-sizing: border-box; }
        .notif-banner { background: #3498db; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; text-align: center; cursor: pointer; border: 2px solid #fff;}
        
        /* 菜單卡片 */
        #menu { display: grid; grid-template-columns: 1fr; gap: 10px; }
        .item-row { background: var(--card); padding: 12px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--primary); }
        .btn-qty { width: 40px; height: 40px; border-radius: 50%; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; font-size: 18px; }

        /* 🖥️ 電腦版響應式：菜單變雙排 */
        @media (min-width: 768px) {
            #orderPage.page { max-width: 800px; }
            #menu { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<div id="homePage" class="page active">
    <h2 style="text-align:center; color:var(--primary); margin-top:50px;">🍙 飯丸屋沖繩飯糰</h2>
    <button class="btn-main" style="background:#2ecc71; font-size:24px; padding:30px; margin-top:30px;" onclick="startGuestOrder()">🍱 開始點餐</button>
    <button class="btn-main" style="background:#3498db" onclick="showPage('queryPage')">🔍 查詢我的訂單</button>
</div>

<div id="orderPage" class="page">
    <h3 id="orderTitle">🍙 選擇餐點</h3>
    <div id="menu"></div>
    <div style="background:#333; padding:15px; border-radius:10px; margin-top:15px">
        <label>取餐時間：</label>
        <select id="pickupTime" onchange="checkPaymentRules()"></select>
        <label>付款方式：</label>
        <select id="payMethod" onchange="checkPaymentRules()">
            <option value="信用卡">💳 信用卡 (線上預付)</option>
            <option value="現金">💵 現場付款 (到店結帳)</option>
        </select>
        <h2 style="text-align:right;">總計: $<span id="totalTxt">0</span></h2>
        <button id="submitBtn" class="btn-main" onclick="submitOrder()">確認點餐</button>
        <button class="btn-main" style="background:#666" onclick="showPage('homePage')">返回</button>
    </div>
</div>

<div id="waitPage" class="page" style="text-align:center;">
    <div class="notif-banner" id="clickHint" onclick="enableAudio()">🔔 點擊此處開啟「取餐語音提醒」</div>
    <h1 id="waitSeq" style="font-size:85px; color:var(--primary); margin: 15px 0;">查詢中...</h1>
    <h2 id="waitNotify" style="margin-bottom: 20px;">⏳ 連線資料庫中</h2>
    <button id="stopAudioBtn" class="btn-main" style="background:#e74c3c; display:none; margin-bottom: 20px;" onclick="stopAudioManual()">✅ 我已收到，關閉鈴聲</button>
    <div id="waitInfo" style="text-align:left; background:#2c3e50; padding:20px; border-radius:12px; font-size:18px;"></div>
    
    <div style="background: rgba(243, 156, 18, 0.15); border: 2px solid #f39c12; color: #fff; padding: 15px; border-radius: 8px; margin: 20px auto; text-align: center; font-weight: bold; line-height: 1.6;">
        ⚠️ 溫馨提醒 ⚠️<br>
        <span style="color: #f39c12; font-size: 1.1em;">請留在此網頁不要關閉或滑走離開，以利等候取餐通知！(滑走會收不到通知喔!!)</span>
    </div>

    <button class="btn-main" style="background:#666; margin-top:10px;" onclick="confirmLeavePage()">結束並返回首頁</button>
</div>

<div id="queryPage" class="page">
    <h3>訂單查詢</h3>
    <input type="text" id="queryInput" placeholder="輸入取餐號 (如 #001)">
    <button class="btn-main" onclick="queryOrder()">送出查詢</button>
    <button class="btn-main" style="background:#666" onclick="showPage('homePage')">返回</button>
</div>

<form id="ecpayForm" method="post" action="" style="display:none"></form>
<audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    const GAS_API_URL = "https://script.google.com/macros/s/AKfycbz0HQ7EsRj1kFhP-UT9DIn90WgXt7q-H8vkEh3fD79_4BuCm5HnCFGF9q3h1mf6pY4s/exec"; 

    const menuItems = [{n:"招牌午餐肉", p:65}, {n:"炸蝦塔塔", p:95}, {n:"咖哩可樂餅", p:85}, {n:"日式炸雞", p:90}, {n:"經典雙拼", p:120}, {n:"沖繩豆乳", p:45}, {n:"花生醬厚牛", p:110}, {n:"宇治抹茶", p:55}];
    let cart = {}; let waitTimer = null; let audioTimeout = null;

    function formatPickupTime(val) {
        if (typeof val === 'string' && val.includes('1899')) {
            const d = new Date(val);
            if (!isNaN(d)) {
                const today = new Date();
                const yyyy = today.getFullYear(), mm = String(today.getMonth() + 1).padStart(2, '0'), dd = String(today.getDate()).padStart(2, '0');
                const hh = String(d.getHours()).padStart(2, '0'), min = String(d.getMinutes()).padStart(2, '0');
                return `${yyyy}/${mm}/${dd} ${hh}:${min}`; 
            }
        }
        return val;
    }

    async function apiCall(action, params = {}) {
        let url = new URL(GAS_API_URL);
        url.searchParams.append('action', action);
        url.searchParams.append('t', new Date().getTime()); // 防快取
        for (let key in params) url.searchParams.append(key, typeof params[key] === 'object' ? JSON.stringify(params[key]) : params[key]);
        try { const response = await fetch(url); return await response.json(); } catch (e) { return null; }
    }

    window.onload = () => { 
        renderMenu(); generateTimeOptions();
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('MerchantTradeNo')) startWaiting(urlParams.get('MerchantTradeNo'), urlParams.get('seq') || "查詢中...");
    };

    function generateTimeOptions() {
        let opts = `<option value="現場取餐">現場取餐 (盡快)</option>`;
        for(let h=11; h<=18; h++) opts += `<option value="${h}:00">${h}:00</option><option value="${h}:30">${h}:30</option>`;
        opts += `<option value="19:00">19:00</option>`;
        document.getElementById('pickupTime').innerHTML = opts;
    }

    function checkPaymentRules() {
        const t = document.getElementById('pickupTime'), p = document.getElementById('payMethod');
        if (t.value !== "現場取餐" && p.value === "現金") { alert("⚠️ 預約需使用線上刷卡！"); p.value = "信用卡"; }
        if (p.value === "現金" && t.value !== "現場取餐") { alert("⚠️ 現金僅限現場取餐！"); t.value = "現場取餐"; }
    }

    function showPage(id) {
        if(waitTimer) clearInterval(waitTimer); stopAudioManual();
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startGuestOrder() { 
        cart = {}; renderMenu(); document.getElementById('totalTxt').innerText = "0"; 
        document.getElementById('pickupTime').value = "現場取餐"; document.getElementById('payMethod').value = "信用卡"; 
        const btn = document.getElementById('submitBtn'); if(btn) { btn.disabled = false; btn.innerText = "確認點餐"; }
        showPage('orderPage'); 
    }

    function renderMenu() { document.getElementById('menu').innerHTML = menuItems.map(m => `<div class="item-row"><span>${m.n} ($${m.p})</span><div><button class="btn-qty" onclick="editCart('${m.n}',-1)">-</button><span style="margin:0 10px; width:20px; display:inline-block; text-align:center;">${cart[m.n] || 0}</span><button class="btn-qty" onclick="editCart('${m.n}',1)">+</button></div></div>`).join(''); }
    function editCart(n, d) { cart[n] = (cart[n] || 0) + d; if(cart[n] <= 0) delete cart[n]; renderMenu(); let t = 0; for(let k in cart) t += menuItems.find(i=>i.n===k).p * cart[k]; document.getElementById('totalTxt').innerText = t; }

    async function submitOrder() {
        if(Object.keys(cart).length === 0) return alert("請選餐");
        const btn = document.getElementById('submitBtn'); const oriText = btn.innerText;
        btn.disabled = true; btn.innerText = "訂單送出中...";
        const orderData = { items: Object.keys(cart).map(k => `${k}x${cart[k]}`).join(','), total: document.getElementById('totalTxt').innerText, pickupTime: document.getElementById('pickupTime').value, payMethod: document.getElementById('payMethod').value };
        const frontendUrl = window.location.href.split('?')[0]; 
        const res = await apiCall("submitOrder", { orderData: orderData, frontendUrl: frontendUrl });
        
        if (orderData.payMethod === "信用卡" && res && res.ecpayData && !res.error) {
            const form = document.getElementById('ecpayForm'); form.action = res.ecpayData.ServiceURL; form.target = "_blank"; 
            form.innerHTML = Object.keys(res.ecpayData).map(key => key!=="ServiceURL" ? `<input type="hidden" name="${key}" value="${res.ecpayData[key]}">` : '').join('');
            form.submit(); startWaiting(res.orderId, res.seqId); 
        } else if (res && !res.error) { startWaiting(res.orderId, res.seqId); 
        } else {
            alert("下單失敗：" + (res && res.error ? res.error : "網路連線異常"));
            btn.disabled = false; btn.innerText = oriText;
        }
    }

    function startWaiting(id, preloadedSeq) {
        showPage('waitPage'); document.getElementById('waitSeq').innerText = preloadedSeq ? preloadedSeq : "查詢中...";
        const fetchStatus = async () => {
            const res = await apiCall("checkMyOrder", { id: id });
            if(res && !res.error) {
                document.getElementById('waitSeq').innerText = res.seqId;
                const pk = formatPickupTime(res.pickup); 
                document.getElementById('waitInfo').innerHTML = `<div style="color:#f39c12; font-weight:bold;">📝 內容：</div><div>${res.items.split(',').join('<br>')}</div><div style="color:#2ecc71; font-weight:bold;">⏰ 取餐：${pk}</div>`;
                let notifyTxt = res.status === '待付款' ? "💳 待付款確認中..." : (res.status === '待收款' ? "💵 請至櫃檯結帳..." : "🍳 餐點準備中...");
                document.getElementById('waitNotify').innerText = notifyTxt;
                
                if (res.status === "已作廢") { document.getElementById('waitNotify').innerText = "🚫 此訂單已作廢"; clearInterval(waitTimer); stopAudioManual();
                } else if(res.notify === "請取餐") { document.getElementById('waitNotify').innerText = "🔔 請至櫃檯取餐！"; playNotificationSound(); clearInterval(waitTimer); 
                } else if(res.status === "已完成") { document.getElementById('waitNotify').innerText = "✅ 訂單已結案"; clearInterval(waitTimer); stopAudioManual(); }
            }
        };
        fetchStatus(); if(waitTimer) clearInterval(waitTimer); waitTimer = setInterval(fetchStatus, 5000); 
    }

    function playNotificationSound() { const a = document.getElementById('notifSound'); a.loop = true; a.play().catch(e=>{}); document.getElementById('stopAudioBtn').style.display = "block"; if(audioTimeout) clearTimeout(audioTimeout); audioTimeout = setTimeout(stopAudioManual, 600000); }
    function stopAudioManual() { const a = document.getElementById('notifSound'); a.pause(); a.currentTime = 0; a.loop = false; document.getElementById('stopAudioBtn').style.display = "none"; if(audioTimeout) clearTimeout(audioTimeout); }
    function enableAudio() { document.getElementById('notifSound').play().then(() => { document.getElementById('notifSound').pause(); document.getElementById('clickHint').innerText = "✅ 語音提醒已準備就緒"; document.getElementById('clickHint').style.background = "#2ecc71"; }); }
    function queryOrder() { const id = document.getElementById('queryInput').value.trim(); if(id) startWaiting(id); else alert("請輸入單號"); }
    
    // 新增：攔截返回首頁的確認視窗邏輯
    function confirmLeavePage() {
        // 動態抓取畫面上大字體的單號
        const currentSeq = document.getElementById('waitSeq').innerText;
        
        // 組裝要提醒客人的文字內容
        const msg = "⚠️ 離開頁面提醒 ⚠️\n\n您的取餐單號是：【 " + currentSeq + " 】\n\n請務必記下或截圖您的單號！\n若不小心關閉網頁，需使用此單號重新查詢進度。\n\n您確定要結束並返回首頁嗎？";
        
        // 彈出確認視窗，如果按了「確定」，就執行原本的 showPage('homePage')
        if (confirm(msg)) {
            showPage('homePage');
        }
    }
</script>
</body>
</html>
